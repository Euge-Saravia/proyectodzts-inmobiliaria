name: CI

on:
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

env:
  NEXT_PUBLIC_SANITY_PROJECT_ID: "ci-placeholder"
  NEXT_PUBLIC_SANITY_DATASET: "ci-placeholder"
  SANITY_STUDIO_PROJECT_ID: "ci-placeholder"
  SANITY_STUDIO_DATASET: "ci-placeholder"

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm --filter dzts-website lint

      - name: Unit tests frontend
        run: pnpm --filter dzts-website test

      # Typecheck instead of `next build`: the frontend build fetches content
      # from Sanity at build time, which can't run against ci-placeholder creds.
      # The full frontend build is validated in e2e.yml (real preview creds).
      - name: Typecheck frontend
        run: pnpm --filter dzts-website exec tsc --noEmit

      - name: Build studio
        run: pnpm --filter dzts-studio exec sanity build
