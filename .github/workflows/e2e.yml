name: E2E Tests

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "apps/frontend/**"
      - ".github/workflows/e2e.yml"

jobs:
  # Reads the @playwright/test version from the lockfile so the e2e job can run
  # in the matching Playwright container image. This keeps the browser binaries
  # (baked into the image) in sync with the npm package automatically — Dependabot
  # bumps the lockfile, the container tag follows. No manual tag bump needed.
  resolve-playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - id: version
        run: |
          V=$(grep -oP '(?<=@playwright/test@)[0-9]+\.[0-9]+\.[0-9]+' pnpm-lock.yaml | head -1)
          if [ -z "$V" ]; then
            echo "Could not resolve @playwright/test version from pnpm-lock.yaml" >&2
            exit 1
          fi
          echo "Resolved Playwright version: $V"
          echo "version=$V" >> "$GITHUB_OUTPUT"

  e2e:
    needs: resolve-playwright
    runs-on: ubuntu-latest
    # Browsers + OS deps are preinstalled in this image, so there is no
    # `playwright install` download step (it used to hang and time out the job).
    # The tag tracks the lockfile via the resolve-playwright job above.
    container:
      image: mcr.microsoft.com/playwright:v${{ needs.resolve-playwright.outputs.version }}-noble
    environment: preview
    timeout-minutes: 15

    env:
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.NEXT_PUBLIC_SANITY_PROJECT_ID }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ vars.NEXT_PUBLIC_SANITY_DATASET }}

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter dzts-website build

      - name: Run e2e tests
        run: pnpm --filter dzts-website test:e2e

      - name: Upload test report
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/frontend/playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: ${{ !cancelled() }}
        with:
          name: test-results
          path: apps/frontend/test-results/
          retention-days: 7
          if-no-files-found: ignore
